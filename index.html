<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Chat-Website</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    .box {
      width: min(720px, 90%);
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      padding: 42px;
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.08);
      text-align: center;
    }
    h1 {
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      letter-spacing: -0.07em;
      line-height: 0.95;
      margin: 0 0 18px;
    }
    p {
      color: #6b7280;
      font-size: 1.1rem;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #111827;
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Noch keine Website veröffentlicht</h1>
    <p>
      Öffne den Builder, gestalte deine Website per Chat und speichere sie danach
      direkt als <strong>index.html</strong> in GitHub.
    </p>
    <a href="builder.html">Builder öffnen</a>
  </main>
</body>
</html>
